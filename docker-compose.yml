services:
  nextstop:
    build: .
    container_name: nextstop
    ports:
      - "3001:3001"
    volumes:
      - nextstop_data:/data
    restart: unless-stopped
    environment:
      - HA_WEBHOOK_URL=http://YOUR_HA_IP:8123/api/webhook/nextstop_signup

  nextstop-mexico:
    build: .
    container_name: nextstop-mexico
    ports:
      - "3002:3001"
    volumes:
      - nextstop_mexico_data:/data
    restart: unless-stopped

volumes:
  nextstop_data:
  nextstop_mexico_data:
