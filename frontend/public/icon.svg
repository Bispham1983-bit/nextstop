<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#005f99"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#sky)"/>

  <!-- Sun glow -->
  <circle cx="256" cy="210" r="90" fill="rgba(255,253,231,0.18)"/>
  <circle cx="256" cy="210" r="62" fill="#fffde7"/>

  <!-- Plane (top-down silhouette, white) -->
  <g transform="translate(256,330) rotate(-35)" fill="white">
    <!-- Fuselage -->
    <ellipse cx="0" cy="0" rx="14" ry="58"/>
    <!-- Wings -->
    <ellipse cx="0" cy="-8" rx="72" ry="14" transform="rotate(-4)"/>
    <!-- Tail fins -->
    <ellipse cx="0" cy="44" rx="32" ry="8"/>
  </g>
</svg>
